plugin {
    hyprwinwrap {
        # class is an EXACT match and NOT a regex!
        class = bg
        # you can also use title
        title = bg
        title = Picture-in-Picture
        # you can add the position of the window in a percentage
        pos_x = 0
        pos_y = 0
        # you can add he size of the window in a percentage
        size_x = 100%
        size_y = 100%
    }
}
