# ┃                     Monitor Configuration                   ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Monitor wiki https://wiki.hyprland.org/Configuring/Monitors/

monitor = , preferred, auto, 1

monitorv2 {
    output   = eDP-2
    mode     = highres@highrr
    position = 0x0
    scale    = 1.6
}

monitorv2 {
    output      = HDMI-A-1
    mode        = highres@highrr
    position    = auto-right
    # disabled  = true
    # addreserved = 0, 0, 100, 0
    mirror = eDP-2
}

xwayland {
    force_zero_scaling = true       # Unscale XWayland
}
